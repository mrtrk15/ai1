<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: green;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 24px;
            border: none;
            cursor: pointer;
        }

        .container {
            width: 90%;
            margin: 50px auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            border: 3px solid #1f2d4d;
            border-radius: 40px;
            padding: 30px;
            background: #f9f9f9;
            min-height: 200px;
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .status {
            text-align: center;
            font-size: 28px;
            margin-top: 40px;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            font-size: 20px;
        }

        input {
            width: 80px;
            height: 35px;
            border-radius: 10px;
            border: 2px solid #1f2d4d;
        }

        .simulate-btn {
            display: block;
            margin: 10px auto;
            padding: 10px 30px;
            font-size: 20px;
            background: #4a6fb3;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .bottom-btn {
            display: block;
            margin: 40px auto;
            padding: 15px 50px;
            font-size: 24px;
            background: #4a6fb3;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }

        .text {
            font-size: 22px;
            margin: 10px 0;
        }
    </style>
</head>

<body>

<a href="/">
    <button class="home-btn">🏠</button>
</a>

<div class="container">

    <div class="grid">

        <!-- CGPA -->
        <div class="card">
            <h2>📊 Current Academic Status</h2>
            <div class="status" id="cgpaDisplay">
                Predicted CGPA: -
            </div>
        </div>

        <!-- Reasons -->
        <div class="card">
            <h2>Impact Analysis</h2>
            <div class="text" id="reason1"></div>
            <div class="text" id="reason2"></div>
        </div>

        <!-- Simulation -->
        <div class="card">
            <h2>What-If Simulation</h2>

            <div class="row">
                Attendance:
                <input type="number" id="simAttendance">
            </div>

            <div class="row">
                Study Hours:
                <input type="number" id="simStudy">
            </div>

            <button class="simulate-btn" onclick="simulate()">Simulate</button>

            <div class="text" id="simResult">
                Simulated CGPA: -
            </div>
        </div>

        <!-- Suggestions -->
        <div class="card">
            <h2>Personal Suggestions</h2>
            <div class="text" id="suggestion1"></div>
            <div class="text" id="suggestion2"></div>
        </div>

    </div>

    <button class="bottom-btn" onclick="goToAdvisor()">
        Learning Mode Advisor →
    </button>

</div>

<script>

// Load result from localStorage
let data = JSON.parse(localStorage.getItem("resultData"));

if(data){

    document.getElementById("cgpaDisplay").innerText =
        "Predicted CGPA: " + data.predicted_cgpa;

    document.getElementById("reason1").innerText =
        "Reason: " + data.reason1;

    document.getElementById("reason2").innerText =
        "Reason: " + data.reason2;

    document.getElementById("suggestion1").innerText =
        "Suggestion: " + data.suggestion1;

    document.getElementById("suggestion2").innerText =
        "Suggestion: " + data.suggestion2;
}


// Simulation logic
function simulate(){

    let attendance = parseFloat(document.getElementById("simAttendance").value);
    let study = parseFloat(document.getElementById("simStudy").value);

    if(isNaN(attendance) || isNaN(study)){
        alert("Enter values for simulation");
        return;
    }

    let cgpa = (attendance * 0.02) + (study * 0.3);

    cgpa = Math.max(0, Math.min(10, cgpa));

    document.getElementById("simResult").innerText =
        "Simulated CGPA: " + cgpa.toFixed(2);
}


// Navigation
function goToAdvisor(){
    window.location.href = "/advisor";
}

</script>

</body>
</html>
