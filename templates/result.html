<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: green;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 24px;
            border: none;
            cursor: pointer;
        }

        .container {
            width: 90%;
            margin: 50px auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            border: 3px solid #1f2d4d;
            border-radius: 40px;
            padding: 30px;
            background: #f9f9f9;
            min-height: 200px;
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .status {
            text-align: center;
            font-size: 28px;
            margin-top: 20px;
        }

        .category {
            text-align: center;
            font-size: 24px;
            margin-top: 10px;
            font-weight: bold;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            font-size: 20px;
        }

        input {
            width: 80px;
            height: 35px;
            border-radius: 10px;
            border: 2px solid #1f2d4d;
        }

        .simulate-btn {
            display: block;
            margin: 10px auto;
            padding: 10px 30px;
            font-size: 20px;
            background: #4a6fb3;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .bottom-btn {
            display: block;
            margin: 40px auto;
            padding: 15px 50px;
            font-size: 24px;
            background: #4a6fb3;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }

        .list {
            font-size: 20px;
            margin: 10px 0;
        }
    </style>
</head>

<body>

<a href="/">
    <button class="home-btn">🏠</button>
</a>

<div class="container">

    <div class="grid">

        <!-- STATUS -->
        <div class="card">
            <h2>📊 Academic Status</h2>
            <div class="status" id="cgpaDisplay">CGPA: -</div>
            <div class="category" id="categoryDisplay"></div>
        </div>

        <!-- REASONS -->
        <div class="card">
            <h2>📉 Impact Analysis</h2>
            <div id="reasonsList"></div>
        </div>

        <!-- SIMULATION -->
        <div class="card">
            <h2>🔄 What-If Simulation</h2>

            <div class="row">
                Attendance:
                <input type="number" id="simAttendance">
            </div>

            <div class="row">
                Study Hours:
                <input type="number" id="simStudy">
            </div>

            <button class="simulate-btn" onclick="simulate()">Simulate</button>

            <div class="list" id="simResult">
                Simulated CGPA: -
            </div>
        </div>

        <!-- SUGGESTIONS -->
        <div class="card">
            <h2>💡 Suggestions</h2>
            <div id="suggestionsList"></div>
        </div>

    </div>

    <button class="bottom-btn" onclick="goToAdvisor()">
        Learning Mode Advisor →
    </button>

</div>

<script>

// Load data
let data = JSON.parse(localStorage.getItem("resultData"));

if(data){

    document.getElementById("cgpaDisplay").innerText =
        "Predicted CGPA: " + data.predicted_cgpa;

    let categoryEl = document.getElementById("categoryDisplay");
    categoryEl.innerText = data.category;

    if(data.category === "Excellent") categoryEl.style.color = "green";
    else if(data.category === "Good") categoryEl.style.color = "blue";
    else if(data.category === "Average") categoryEl.style.color = "orange";
    else categoryEl.style.color = "red";

    let reasonsDiv = document.getElementById("reasonsList");
    data.reasons.forEach(r => {
        let p = document.createElement("p");
        p.className = "list";
        p.innerText = "• " + r;
        reasonsDiv.appendChild(p);
    });

    let sugDiv = document.getElementById("suggestionsList");
    data.suggestions.forEach(s => {
        let p = document.createElement("p");
        p.className = "list";
        p.innerText = "• " + s;
        sugDiv.appendChild(p);
    });
}


// ✅ SIMULATION
function simulate(){

    let base = JSON.parse(localStorage.getItem("inputData"));

    if(!base){
        alert("No base data found");
        return;
    }

    let newAttendance = parseFloat(document.getElementById("simAttendance").value);
    let newStudy = parseFloat(document.getElementById("simStudy").value);

    if(isNaN(newAttendance) || isNaN(newStudy)){
        alert("Enter values");
        return;
    }

    let sim = {...base};
    sim.attendance = newAttendance;
    sim.study_hours = newStudy;

    let attendance_score = sim.attendance / 100;
    let study_score = sim.study_hours / 24;
    let internal_score = sim.internal / 50;
    let revision_score = sim.revision / 5;
    let problem_score = sim.problem_solving / 5;

    let cgpa = (
        (attendance_score * 2.5) +
        (study_score * 2.5) +
        (internal_score * 2.5) +
        (revision_score * 1.5) +
        (problem_score * 1.5) -
        (sim.backlogs * 0.5) -
        (sim.screen_time * 0.1)
    );

    cgpa = (cgpa * 0.7) + (sim.prev_cgpa * 0.3);

    cgpa = Math.max(0, Math.min(10, cgpa));

    document.getElementById("simResult").innerText =
        "Simulated CGPA: " + cgpa.toFixed(2);
    localStorage.setItem("simulatedData", JSON.stringify({
    study_hours: newStudy,
    attendance: newAttendance
}));
}


// Navigation
function goToAdvisor(){
    window.location.href = "/advisor";
}

</script>

</body>
</html>
