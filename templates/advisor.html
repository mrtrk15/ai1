<!DOCTYPE html>
<html>
<head>
    <title>Learning Mode Advisor</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 50px auto;
        }

        .card {
            border: 3px solid #1f2d4d;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 20px;
            background: #fff;
        }

        h1 {
            text-align: center;
        }

        .btn {
            padding: 10px 30px;
            font-size: 18px;
            margin-top: 15px;
            cursor: pointer;
            background: #4a6fb3;
            color: white;
            border: none;
            border-radius: 10px;
        }

        select {
            height: 35px;
            width: 200px;
            margin-top: 10px;
        }

        .result {
            font-size: 18px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🎯 Learning Mode Advisor</h1>

    <!-- STEP 1 -->
    <div class="card">
        <h2>Select Mode</h2>

        <select id="mode">
            <option value="">Select</option>
            <option value="Online">Online</option>
            <option value="Offline">Offline</option>
        </select>

        <br>
        <button class="btn" onclick="nextStep()">Next</button>
    </div>

    <!-- STEP 2 -->
    <div class="card" id="step2" style="display:none;">
        <h2>Behavior Analysis</h2>

        <p>Distraction Level:</p>
        <select id="distraction">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>

        <p>Consistency:</p>
        <select id="consistency">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>

        <br>
        <button class="btn" onclick="getAdvice()">Get Advice</button>
    </div>

    <!-- STEP 3 -->
    <div class="card" id="resultBox" style="display:none;"></div>

    <!-- 🔥 GO TO PLANNER BUTTON -->
    <div style="text-align:center;">
        <button id="plannerBtn" class="btn" onclick="goToPlanner()" style="display:none;">
            ➡️ Go to Planner
        </button>
    </div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("resultData"));
let selectedMode = "";

// STEP 1
function nextStep(){
    selectedMode = document.getElementById("mode").value;

    if(!selectedMode){
        alert("Please select a mode");
        return;
    }

    document.getElementById("step2").style.display = "block";
}

// STEP 2 → FINAL ADVICE
function getAdvice(){

    let distraction = document.getElementById("distraction").value;
    let consistency = document.getElementById("consistency").value;

    let online = data.online_cgpa;
    let offline = data.offline_cgpa;

    let output = "<h3>📊 CGPA Comparison</h3>";
    output += "Online: " + online + "<br>";
    output += "Offline: " + offline + "<br><br>";

    // LOGIC
    if(selectedMode === "Online"){

        if(distraction === "high"){
            output += "⚠️ High distraction may reduce performance in Online mode.<br>";
        }

        if(online < offline){
            output += "👉 Offline may give better results.<br>";
        } else {
            output += "✅ Online mode is suitable for you.<br>";
        }

    }

    if(selectedMode === "Offline"){

        if(offline < online){
            output += "👉 Online mode may give better results.<br>";
        } else {
            output += "✅ Offline mode is suitable for you.<br>";
        }

    }

    // SHOW RESULT
    document.getElementById("resultBox").style.display = "block";
    document.getElementById("resultBox").innerHTML = output;

    // SHOW PLANNER BUTTON
    document.getElementById("plannerBtn").style.display = "block";
}

// NAVIGATION
function goToPlanner(){
    window.location.href = "/planner";
}

</script>

</body>
</html>
