<!DOCTYPE html>
<html>
<head>
    <title>Learning Mode Advisor</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        h1 {
            text-align: center;
            margin-top: 30px;
            font-size: 45px;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: green;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 24px;
            border: none;
            cursor: pointer;
        }

        .container {
            width: 90%;
            margin: 40px auto;
        }

        .grid {
            display: flex;
            justify-content: space-between;
            gap: 40px;
        }

        .card {
            width: 48%;
            border: 3px solid #1f2d4d;
            border-radius: 40px;
            padding: 30px;
            background: #f9f9f9;
            min-height: 250px;
        }

        .card h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            font-size: 22px;
        }

        .field input {
            width: 100px;
            height: 40px;
            border-radius: 10px;
            border: 2px solid #1f2d4d;
        }

        .analyse-btn {
            display: block;
            margin: 30px auto 0;
            padding: 10px 40px;
            font-size: 22px;
            background: #4a6fb3;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .text {
            font-size: 22px;
            margin: 15px 0;
        }

        .bottom-btn {
            display: block;
            margin: 60px auto;
            padding: 15px 60px;
            font-size: 28px;
            background: #4a6fb3;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<a href="/">
    <button class="home-btn">🏠</button>
</a>

<h1>Learning mode advisor</h1>

<div class="container">

    <div class="grid">

        <!-- LEFT: Behavioral -->
        <div class="card">
            <h2>Behavioral Assessment</h2>

            <div class="field">
                Distraction Level (1-5) :
                <input type="number" min="1" max="5">
            </div>

            <div class="field">
                Self Discipline (1-5):
                <input type="number" min="1" max="5">
            </div>

            <button class="analyse-btn" onclick="analyse()">Analyse</button>
        </div>

        <!-- RIGHT: Result -->
        <div class="card">
            <h2>Advisor Result</h2>

            <div class="text">Online Mode Predicted CGPA:</div>
            <div class="text">Offline Mode Predicted CGPA:</div>
            <div class="text">Final Recommendation:</div>
            <div class="text">Recommended Weekly Study Hours:</div>
        </div>

    </div>

    <button class="bottom-btn" onclick="goToPlanner()">
        Go to Planner
    </button>

</div>

<script>
function analyse(){
    alert("Analysis complete (connect ML model here)");
}

function goToPlanner(){
    window.location.href = "/planner";
}
</script>

</body>
</html>
