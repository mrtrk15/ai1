<!DOCTYPE html>
<html>
<head>
    <title>Study Sessions</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            text-align: center;
        }

        .top {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            font-size: 22px;
        }

        input {
            padding: 5px;
            border-radius: 8px;
            border: 2px solid #1f2d4d;
        }

        .session-box {
            border: 3px dashed #1f2d4d;
            border-radius: 30px;
            padding: 25px;
            margin: 30px;
            background: #f9f9f9;
            text-align: left;
        }

        .row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            align-items: center;
        }

        .circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .buttons {
            text-align: center;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #1f2d4d;
            background: white;
            cursor: pointer;
            margin: 5px;
        }

        .add-btn {
            padding: 12px 30px;
            font-size: 18px;
            margin: 20px;
        }

        #warning {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Study Sessions</h2>
<h3 id="selectedDate"></h3>

<!-- TOP HOURS -->
<div class="top">
    <div>
        TOTAL STUDY HOURS:
        <input id="totalHours" readonly>
    </div>

    <div>
        PLANNED STUDY HOURS:
        <input id="plannedHours" readonly>
    </div>
</div>

<p id="warning"></p>

<div id="sessions-container"></div>

<button class="add-btn" onclick="addSession()">+ Add Session</button>

<script>
let sessionCount = 0;
let sessionsData = [];

// 📅 Get selected day
const params = new URLSearchParams(window.location.search);
const day = params.get("day");

if(day){
    document.getElementById("selectedDate").innerText = "Selected Date: " + day;
}

// 🔥 Get full schedule
let fullSchedule = JSON.parse(localStorage.getItem("fullSchedule")) || [];

let today = new Date();
let selectedDate = new Date(today.getFullYear(), today.getMonth(), day);

let matched = fullSchedule.find(item => {
    let d = new Date(item.date);
    return d.getDate() == selectedDate.getDate() &&
           d.getMonth() == selectedDate.getMonth() &&
           d.getFullYear() == selectedDate.getFullYear();
});

let totalHours = matched ? matched.hours : 0;
document.getElementById("totalHours").value = totalHours;


// ➕ Add session
function addSession(){

    sessionCount++;

    sessionsData.push({
        pdfs: [],
        videos: []
    });

    let index = sessionCount - 1;

    let div = document.createElement("div");
    div.className = "session-box";

    div.innerHTML = `
        <h3>Session ${sessionCount}</h3>

        <div class="row">
            <div>
                Timings: 
                <input type="time" onchange="updateHours()"> 
                to 
                <input type="time" onchange="updateHours()">
            </div>

            <div class="row">
                <span>Upload:</span>

                <div>
                    <input type="file" accept=".pdf" multiple onchange="handlePDF(event, ${index})">
                    <div class="docCount">0</div>
                </div>

                <div>
                    <div class="circle">▶</div>
                    <div class="videoCount">0</div>
                </div>

                <input type="text" placeholder="paste video link">
                <button onclick="addVideo(this, ${index})">Add video</button>
            </div>
        </div>

        <div class="buttons">
            <button onclick="startStudy(${index})">Start Study</button>
            <button onclick="markStudied(this)">Mark as studied</button>
        </div>
    `;

    document.getElementById("sessions-container").appendChild(div);
}


// 📁 HANDLE PDF
function handlePDF(event, index){

    let files = event.target.files;

    for(let file of files){
        sessionsData[index].pdfs.push(URL.createObjectURL(file));
    }

    event.target.parentElement.querySelector(".docCount").innerText =
        sessionsData[index].pdfs.length;
}


// 🎥 ADD VIDEO
function addVideo(btn, index){

    let parent = btn.parentElement;
    let input = parent.querySelector("input[type='text']");
    let countDiv = parent.querySelector(".videoCount");

    if(input.value.trim() !== ""){

        let video = input.value.replace("watch?v=", "embed/");

        sessionsData[index].videos.push(video);

        countDiv.innerText = sessionsData[index].videos.length;

        input.value = "";
    }
}


// ▶️ START STUDY (MAIN FEATURE 🔥)
function startStudy(index){

    let session = sessionsData[index];

    if(session.pdfs.length === 0 && session.videos.length === 0){
        alert("Add PDF or Video first");
        return;
    }

    // 🔥 SAVE FOR FOCUS MODE
    localStorage.setItem("focusSession", JSON.stringify(session));

    // 🔥 STORE IN 10-DAY STORAGE
    let allSessions = JSON.parse(localStorage.getItem("allSessions")) || [];

    allSessions.push({
        date: selectedDate.toISOString(),
        data: session,
        created_at: Date.now()
    });

    // limit 10 days
    allSessions = allSessions.filter(s =>
        Date.now() - s.created_at <= (10 * 24 * 60 * 60 * 1000)
    );

    localStorage.setItem("allSessions", JSON.stringify(allSessions));

    window.location.href = "/focus";
}


// 📊 HOURS CALCULATION (same)
function updateHours(){
    let total = 0;

    document.querySelectorAll(".session-box").forEach(box => {
        let times = box.querySelectorAll("input[type='time']");

        if(times[0].value && times[1].value){
            let s = times[0].value.split(":");
            let e = times[1].value.split(":");

            let start = (+s[0])*60 + (+s[1]);
            let end = (+e[0])*60 + (+e[1]);

            if(end > start){
                total += (end - start)/60;
            }
        }
    });

    document.getElementById("plannedHours").value = total.toFixed(2);

    if(total < totalHours){
        document.getElementById("warning").innerText =
            "⚠️ Planned hours are less than required. Study more!";
    } else {
        document.getElementById("warning").innerText = "";
    }
}


// mark studied (same)
function markStudied(btn){
    btn.innerText = "Completed";
    btn.style.background = "lightblue";
}


// First session auto
addSession();
</script>

</body>
</html>
